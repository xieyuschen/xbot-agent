name: Release

on:
  push:
    branches:
      - master           # nightly: auto on merge
    tags:
      - 'v*'             # stable: v1.2.3  /  beta: v1.2.3-beta.1
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (nightly or beta)'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - beta

permissions:
  contents: write

env:
  COMMIT: ${{ github.sha }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "branch" ]]; then
            # push to master → nightly
            DATE=$(date -u +%Y%m%d)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=nightly-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # push tag → stable or beta
            TAG="${{ github.ref_name }}"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
            if [[ "$TAG" == *"-"* ]]; then
              echo "channel=beta" >> "$GITHUB_OUTPUT"
            else
              echo "channel=stable" >> "$GITHUB_OUTPUT"
            fi
          else
            # workflow_dispatch → manual nightly or beta
            CH="${{ github.event.inputs.channel }}"
            DATE=$(date -u +%Y%m%d)
            if [[ "$CH" == "nightly" ]]; then
              echo "version=nightly-${DATE}" >> "$GITHUB_OUTPUT"
            else
              echo "version=beta-${DATE}" >> "$GITHUB_OUTPUT"
            fi
            echo "channel=${CH}" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: web/yarn.lock

      - name: Build
        working-directory: web
        run: yarn install --frozen-lockfile && yarn build

      - name: Package
        run: mkdir -p dist && tar czf dist/xbot-web-dist.tar.gz -C web/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/xbot-web-dist.tar.gz

  build-linux-amd64:
    name: Build linux/amd64
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X xbot/version.Channel=${CHANNEL}" \
            -o dist/xbot-cli-linux-amd64 ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-linux-amd64
          path: dist/xbot-cli-linux-amd64

  build-linux-arm64:
    name: Build linux/arm64
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X xbot/version.Channel=${CHANNEL}" \
            -o dist/xbot-cli-linux-arm64 ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-linux-arm64
          path: dist/xbot-cli-linux-arm64

  build-darwin-arm64:
    name: Build darwin/arm64
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X xbot/version.Channel=${CHANNEL}" \
            -o dist/xbot-cli-darwin-arm64 ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-darwin-arm64
          path: dist/xbot-cli-darwin-arm64

  build-windows-amd64:
    name: Build windows/amd64
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X xbot/version.Channel=${CHANNEL}" \
            -o dist/xbot-cli-windows-amd64.exe ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-windows-amd64
          path: dist/xbot-cli-windows-amd64.exe

  build-windows-arm64:
    name: Build windows/arm64
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X xbot/version.Channel=${CHANNEL}" \
            -o dist/xbot-cli-windows-arm64.exe ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-windows-arm64
          path: dist/xbot-cli-windows-arm64.exe

  release:
    name: Release
    needs: [prepare, frontend, build-linux-amd64, build-linux-arm64, build-darwin-arm64, build-windows-amd64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > ../checksums.txt

      - name: Determine prerelease flag and release tag
        id: prerelease
        run: |
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          if [[ "$CHANNEL" == "nightly" || "$CHANNEL" == "beta" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          # Nightly uses a fixed tag so the release is overwritten each run.
          # Stable/beta keep unique tags (v1.2.3, beta-YYYYMMDD).
          if [[ "$CHANNEL" == "nightly" ]]; then
            echo "release_tag=nightly" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prerelease.outputs.release_tag }}
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## ${{ needs.prepare.outputs.version }}

            Commit: `${{ env.COMMIT }}`
            Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          files: |
            dist/xbot-cli-linux-amd64
            dist/xbot-cli-linux-arm64
            dist/xbot-cli-darwin-arm64
            dist/xbot-cli-windows-amd64.exe
            dist/xbot-cli-windows-arm64.exe
            dist/xbot-web-dist.tar.gz
            checksums.txt
